version: "2"

run:
  go: "1.26.3"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - modernize

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rajmohanram/pdc

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
